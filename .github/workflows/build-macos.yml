name: Build macOS App

on:
  push:
    tags: ['v*', 'daily-*']
  workflow_dispatch:

permissions:
  contents: write # needed to attach the DMG to the release

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      # This is a flag to enable/disable signing and notarization steps
      MACOS_SIGNING_IS_SET: ${{ secrets.SIGNING_CERTIFICATE_P12_B64 != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"
          # pillow-heif is needed for HEIC support, and its own dependencies
          # might need to be built, so it's good to have it here.
          pip install pillow-heif

      - name: Create temporary keychain
        if: env.MACOS_SIGNING_IS_SET == 'true'
        id: create_keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          # Create a new keychain
          security create-keychain -p "${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}" "$KEYCHAIN_PATH"
          # Make the new keychain the default
          security default-keychain -s "$KEYCHAIN_PATH"
          # Unlock the new keychain
          security unlock-keychain -p "${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}" "$KEYCHAIN_PATH"
          # Set keychain timeout to 1 hour
          security set-keychain-settings -lut 3600
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Import signing certificate
        if: env.MACOS_SIGNING_IS_SET == 'true'
        run: |
          echo "${{ secrets.SIGNING_CERTIFICATE_P12_B64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          rm certificate.p12
          # Allow codesign to access the keychain without prompting
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}" "$KEYCHAIN_PATH"

      - name: Store notarization credentials
        if: env.MACOS_SIGNING_IS_SET == 'true'
        run: |
          mkdir -p ~/private_keys
          xcrun notarytool store-credentials "PhotoScribe-Notary" \
            --apple-id "${{ secrets.APPLE_DEVELOPER_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"

      - name: Build and notarize app
        env:
          # The build script reads these to sign and notarize
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }} # e.g., "Developer ID Application: Your Name (TEAMID)"
        run: |
          # The build script is expected to handle the PyInstaller build, signing, and notarization
          chmod +x ./build_app.sh
          ./build_app.sh

      - name: Get DMG path
        id: get_dmg_path
        run: |
          # The build script produces PhotoScribe.dmg in dist/
          echo "dmg_path=$(find dist -name "PhotoScribe.dmg" -print -quit)" >> $GITHUB_OUTPUT

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoScribe-macOS
          path: ${{ steps.get_dmg_path.outputs.dmg_path }}

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ${{ steps.get_dmg_path.outputs.dmg_path }} --clobber

      - name: Clean up keychain and credentials
        if: always() && env.MACOS_SIGNING_IS_SET == 'true'
        run: |
          security delete-keychain "$KEYCHAIN_PATH"
          xcrun notarytool store-credentials remove "PhotoScribe-Notary"