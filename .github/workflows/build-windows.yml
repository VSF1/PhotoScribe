name: Build Windows Installer

on:
  push:
    tags: ['v*', 'daily-*']
  workflow_dispatch:

permissions:
  contents: write   # needed to attach the installer to the release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Download ExifTool for Windows
        shell: pwsh
        run: ./fetch-exiftool.ps1

      - name: Ensure app icon (.ico)
        shell: pwsh
        run: |
          if (Test-Path PhotoScribe.ico) {
            Write-Host "Using committed PhotoScribe.ico"
          } else {
            python -c "from PIL import Image; img=Image.open('logo.png').convert('RGBA'); sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]; imgs=[img.resize(s, Image.LANCZOS) for s in sizes]; imgs[0].save('PhotoScribe.ico', format='ICO', sizes=sizes, append_images=imgs[1:]); print('Icon generated')"
          }

      - name: Build with PyInstaller
        run: pyinstaller PhotoScribe-Windows.spec --noconfirm --clean

      - name: Bundle ExifTool next to the app
        shell: pwsh
        run: |
          Copy-Item exiftool.exe dist\PhotoScribe\ -Force
          Copy-Item exiftool_files dist\PhotoScribe\exiftool_files -Recurse -Force

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -like "v*") { $version = $ref.TrimStart('v') } else { $version = "0.0.0" }
          Write-Host "Installer version: $version"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoScribe-Setup
          path: dist/PhotoScribe-Setup.exe

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} dist/PhotoScribe-Setup.exe --clobber
