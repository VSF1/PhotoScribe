name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Download ExifTool for Windows
        shell: pwsh
        run: |
          $url = "https://exiftool.org/exiftool-13.10_64.zip"
          Invoke-WebRequest -Uri $url -OutFile exiftool.zip
          Expand-Archive -Path exiftool.zip -DestinationPath exiftool_tmp
          # ExifTool ships as "exiftool(-k).exe" — rename to exiftool.exe
          $exe = Get-ChildItem -Path exiftool_tmp -Filter "*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination exiftool.exe
          Remove-Item -Recurse exiftool_tmp, exiftool.zip

      - name: Generate .ico from logo.png
        run: |
          python -c "
          from PIL import Image
          img = Image.open('logo.png').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          imgs = [img.resize(s, Image.LANCZOS) for s in sizes]
          imgs[0].save('PhotoScribe.ico', format='ICO', sizes=sizes, append_images=imgs[1:])
          print('Icon generated')
          "

      - name: Build with PyInstaller
        run: pyinstaller PhotoScribe-Windows.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer.iss

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} dist/PhotoScribe-Setup.exe --clobber
