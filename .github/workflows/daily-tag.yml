name: Daily Tag
on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at 00:00 UTC
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate tag name
        id: generate-tag
        run: |
          TAG_NAME="daily-$(date -u +'%Y%m%d')"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Check if tag exists
        id: check-tag
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Check for new commits since last tag
        id: check-commits
        run: |
          # In case there are no tags yet in the repository
          if ! git describe --tags --abbrev=0 > /dev/null 2>&1; then
            echo "No tags found. Assuming changes exist."
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            exit 0
          fi

          LATEST_TAG=$(git describe --tags --abbrev=0)
          LATEST_TAG_COMMIT=$(git rev-parse "$LATEST_TAG^{commit}")
          HEAD_COMMIT=$(git rev-parse HEAD)

          echo "Latest tag is '$LATEST_TAG' at commit $LATEST_TAG_COMMIT"
          echo "Current HEAD is at commit $HEAD_COMMIT"

          if [ "$LATEST_TAG_COMMIT" == "$HEAD_COMMIT" ]; then
            echo "No new commits since the last tag. A new daily tag will not be created."
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo "New commits found since the last tag."
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Configure Git user
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Create and push tag
        if: env.TAG_EXISTS == 'false' && env.HAS_CHANGES == 'true'
        run: |
          echo "Creating tag: $TAG_NAME"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   
